<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <!--Logo--> 
        <img src="./img/logoandisa.png" alt="Logo">
    </header>
    <nav>
        <div id="menu">
            <a href="#">Minhas Tarefas</a>
            <a id="opcaoAdicionar" href="#">Adicionar Tarefas</a>
            <a href="#">Tarefas Agendadas</a>
        </div>

        <div id="hamburger">
           ☰
        </div>
        </nav>
    <main>
        <section id="criarTarefa">
            <h2>Cria uma Tarefa</h2>
            <p>Título: <input type="text" name="titleTarefa" id="titleTarefa" autocomplete="off"></p>
            <p>Horário: <input type="time" name="horarioTarefa" id="horarioTarefa"></p>
            <p>Validade da Tarefa: <input type="date" name="dataTarefa" id="dataTarefa"></p>
            <button type="submit" id="botaoTarefa">Criar Tarefa</button>
        </section>
        <section id="tarefasPrincipais">
            <h2>Minhas Tarefas</h2>
        </section>
        <section id="tarefasAgendadas">
            <h2>Tarefas Agendadas</h2>
        </section>
    </main>
    <footer>
            <p><strong>Desenvolvido por André Diogo</strong></p>
    </footer>
    <script type="module" src="./script/mainScript.js"></script>
</body>
</html>
