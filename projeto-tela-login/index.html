<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main>
        <header>
            <img src="./imagens/saturno.png" alt="Logo">
        </header>
        <form action="login.php" method="get" >
            <section>
                <h2>Login</h2>
                    <p><label for="txtemail">Email:</label>
                        <input type="email" name="nemail" id="txtemail" placeholder="Digite o seu e-mail" required>
                    </p>
                    <p><label for="txtsenha">Senha:</label>
                        <input type="password" name="nsenha" id="txtsenha" placeholder="Digite a sua senha" required>
                    </p>
                    <button>Entrar</button>
            </section>
        </form>
    </main>
    <footer>
        <p><strong>Desenvolvido por André Diogo</strong></p>
    </footer>
</body>
</html>
